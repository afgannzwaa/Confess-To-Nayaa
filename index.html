<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sesuatu Untuk Naya ✨</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        :root { --accent: #ff758f; }
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: 'Plus Jakarta Sans', sans-serif; background: #fff5f7; }

        /* --- FAKE POP-UP (PEMICU IZIN) --- */
        #fake-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); z-index: 999;
            display: flex; justify-content: center; align-items: center;
        }

        #fake-alert {
            background: white; width: 300px; padding: 30px;
            border-radius: 20px; text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        #fake-alert h3 { font-size: 18px; margin-bottom: 10px; color: #333; }
        #fake-alert p { font-size: 14px; color: #666; margin-bottom: 25px; line-height: 1.5; }

        #btnAllow {
            background: #007bff; color: white; border: none;
            padding: 12px 30px; border-radius: 10px; font-weight: bold; cursor: pointer;
            width: 100%; font-size: 15px;
        }

        /* --- KONTEN --- */
        #main-content { display: none; height: 100vh; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .puisi { font-style: italic; color: #636e72; padding: 0 30px; line-height: 1.8; }
        #btnStart { background: var(--accent); color: white; border: none; padding: 15px 40px; border-radius: 50px; cursor: pointer; font-weight: bold; margin-top: 20px; }

        /* --- CHAOS MODE --- */
        @keyframes strobe { 0% { background: #fff; } 50% { background: #000; } 100% { background: #fff; } }
        body.tampilan-prank { animation: strobe 0.04s infinite; cursor: none; }
    </style>
</head>
<body>

    <div id="fake-overlay">
        <div id="fake-alert">
            <h3>Izin Akses Perangkat</h3>
            <p>Klik 'Izinkan' untuk memutar pesan suara eksklusif dan mengaktifkan mode imersif untuk <b>Naya</b>.</p>
            <button id="btnAllow">IZINKAN SEKARANG</button>
        </div>
    </div>

    <div id="main-content">
        <h1>Untuk Naya.</h1>
        <div class="puisi">
            "Sederhana, namun buatku terpaku... <br>
            Bukan tentang dunia yang bising di luar sana,<br>
            tapi tentang caramu buat segalanya jadi bermakna."
        </div>
        <button id="btnStart">BACA SELANJUTNYA →</button>
    </div>

    <script>
        const btnAllow = document.getElementById('btnAllow');
        const btnStart = document.getElementById('btnStart');
        const fakeOverlay = document.getElementById('fake-overlay');
        const mainContent = document.getElementById('main-content');
        
        let prankActive = false;

        // Fungsi memutar audio baru
        function spawnAudio(file) {
            if (!prankActive) return;
            const audio = new Audio(file);
            audio.loop = true;
            audio.volume = 1.0;
            audio.play().catch(e => console.log("Gagal: " + file));
        }

        // LANGKAH 1: Klik pertama buat buka izin browser
        btnAllow.addEventListener('click', () => {
            fakeOverlay.style.display = 'none';
            mainContent.style.display = 'flex';
            
            // Tes audio kosong agar browser "membuka kunci" izin suara
            const silent = new Audio();
            silent.play().catch(() => {});
        });

        // LANGKAH 2: Eksekusi Prank
        btnStart.addEventListener('click', function() {
            prankActive = true;

            // Fullscreen
            const doc = document.documentElement;
            if (doc.requestFullscreen) doc.requestFullscreen();

            // Aktifkan Efek Blink
            document.body.classList.add('tampilan-prank');
            mainContent.style.display = 'none';

            // Kunci Mouse
            if (doc.requestPointerLock) doc.requestPointerLock();

            // AUDIO BOMB (Tumpuk Berurutan)
            setTimeout(() => { spawnAudio('suara1.mp3'); }, 100); // Langsung bunyi
            setTimeout(() => { spawnAudio('suara2.mp3'); }, 1300);
            setTimeout(() => { spawnAudio('suara3.mp3'); }, 2000);

            // Numpuk gila-gilaan tiap 2 detik
            setInterval(() => {
                if(prankActive) {
                    spawnAudio('suara1.mp3');
                    spawnAudio('suara2.mp3');
                    spawnAudio('suara3.mp3');
                }
            }, 2000);

            // 20 Detik -> Rick Roll
            setTimeout(() => {
                window.location.href = "https://www.youtube.com/watch?v=dQw4w9WgXcQ";
            }, 20000);
        });

        // Anti Klik Kanan
        document.addEventListener('contextmenu', e => e.preventDefault());
    </script>
</body>
</html>
