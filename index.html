<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sesuatu Untuk Naya ✨</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600&family=Playfair+Display:italic,wght@0,700;1,700&display=swap" rel="stylesheet">
    
    <style>
        :root { --accent: #ff758f; }
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: 'Plus Jakarta Sans', sans-serif; background: #fff5f7; }

        /* --- FAKE NOTIF SISTEM --- */
        #fake-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 9999; display: flex; justify-content: center; align-items: center; backdrop-filter: blur(5px); }
        #fake-alert { background: white; width: 300px; padding: 30px; border-radius: 20px; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.3); }
        #btnAllow { background: #007bff; color: white; border: none; padding: 12px 30px; border-radius: 10px; font-weight: bold; cursor: pointer; width: 100%; }

        /* --- KONTEN AWAL --- */
        #main-content { display: none; height: 100vh; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        h1 { font-family: 'Playfair Display', serif; font-size: 32px; color: #2d3436; }
        .puisi { font-style: italic; color: #636e72; line-height: 1.8; margin-bottom: 30px; max-width: 400px; padding: 0 20px; }
        #btnStart { background: var(--accent); color: white; border: none; padding: 15px 45px; border-radius: 50px; cursor: pointer; font-weight: bold; }

        /* --- LAYAR MALWARE (BLINK & POPUP) --- */
        @keyframes strobe { 0% { background: #f00; } 50% { background: #000; } 100% { background: #fff; } }
        body.tampilan-prank { animation: strobe 0.05s infinite !important; cursor: none !important; }
        
        .virus-popup {
            position: absolute; width: 250px; padding: 15px; background: #eee;
            border: 2px solid #ff0000; color: #000; font-family: 'Courier New', Courier, monospace;
            font-weight: bold; z-index: 10000; box-shadow: 10px 10px 0px #f00;
            pointer-events: none;
        }

        #warning-text {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: white; font-size: 50px; font-weight: bold; z-index: 10001;
            text-shadow: 5px 5px 0px red; text-align: center; display: none;
        }
    </style>
</head>
<body>

    <div id="fake-overlay">
        <div id="fake-alert">
            <h3>Izin Akses Perangkat</h3>
            <p>Berikan izin akses multimedia untuk menampilkan pesan spesial buat <b>Naya</b>.</p>
            <button id="btnAllow">IZINKAN SEKARANG</button>
        </div>
    </div>

    <div id="main-content">
        <h1>Untuk Naya.</h1>
        <div class="puisi">
            "Sederhana, namun buatku terpaku...<br>
            Tentang caramu buat segalanya jadi bermakna."
        </div>
        <button id="btnStart">BACA SELANJUTNYA →</button>
    </div>

    <div id="warning-text">SYSTEM BREACHED<br>MALWARE DETECTED</div>

    <script>
        const btnAllow = document.getElementById('btnAllow');
        const btnStart = document.getElementById('btnStart');
        const fakeOverlay = document.getElementById('fake-overlay');
        const mainContent = document.getElementById('main-content');
        const warningText = document.getElementById('warning-text');
        let prankActive = false;

        const suaraOnline = [
            "https://www.soundboard.com/handler/DownLoadTrack.ashx?cliptitle=Scream&filename=24/246411-9a993700-1126-4447-98e3-466d6d79a295.mp3",
            "https://www.soundboard.com/handler/DownLoadTrack.ashx?cliptitle=Female+Scream&filename=24/246401-4966089e-2191-4566-9e8c-85f096752044.mp3"
        ];

        btnAllow.addEventListener('click', () => {
            fakeOverlay.style.display = 'none';
            mainContent.style.display = 'flex';
            new Audio().play().catch(() => {});
        });

        function spawnAudio(src) {
            if (!prankActive) return;
            const audio = new Audio(src);
            audio.loop = true;
            audio.volume = 1.0;
            audio.play();
        }

        function createVirusPopup() {
            if (!prankActive) return;
            const popup = document.createElement('div');
            popup.className = 'virus-popup';
            popup.innerHTML = "⚠️ WARNING! <br> SYSTEM ERROR: 0x800421 <br> DATA CORRUPTED!";
            popup.style.top = Math.random() * 80 + 'vh';
            popup.style.left = Math.random() * 80 + 'vw';
            document.body.appendChild(popup);
        }

        btnStart.addEventListener('click', function() {
            prankActive = true;

            const doc = document.documentElement;
            if (doc.requestFullscreen) doc.requestFullscreen();
            if (doc.requestPointerLock) doc.requestPointerLock();
            
            document.body.classList.add('tampilan-prank');
            mainContent.style.display = 'none';
            warningText.style.display = 'block';

            // AUDIO BOMB
            spawnAudio('suara1.mp3');
            setTimeout(() => spawnAudio(suaraOnline[0]), 1000);
            setTimeout(() => spawnAudio(suaraOnline[1]), 2000);

            // Munculkan Pop-up Virus setiap 0.5 detik
            const virusInterval = setInterval(createVirusPopup, 500);

            // Numpuk suara setiap 2 detik
            const soundInterval = setInterval(() => {
                if(prankActive) spawnAudio(suaraOnline[0]);
            }, 2000);

            // 20 Detik -> Rick Roll
            setTimeout(() => {
                prankActive = false;
                clearInterval(virusInterval);
                clearInterval(soundInterval);
                window.location.href = "https://www.youtube.com/watch?v=dQw4w9WgXcQ";
            }, 20000);
        });

        document.addEventListener('contextmenu', e => e.preventDefault());
        window.onbeforeunload = function() { if (prankActive) return "CRITICAL ERROR!"; };
    </script>
</body>
</html>
